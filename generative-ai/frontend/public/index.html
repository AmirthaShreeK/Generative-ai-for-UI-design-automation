<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generative UI Designer</title>

  <!-- ✅ Local Tailwind build -->
  <link rel="stylesheet" href="./assets/css/build/tailwind.css" />

  <!-- ✅ DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" />

  <!-- ✅ Flowbite -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.7.0/flowbite.min.css" rel="stylesheet" />

  <!-- ✅ FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- ✅ Highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body id="pageBody" class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col items-center justify-center p-4 text-gray-900 dark:text-gray-100 transition-colors duration-300">

  <!-- 🔄 Dark Mode Toggle -->
  <div class="w-full flex justify-end max-w-4xl mb-4 pr-4">
    <button id="themeToggle" class="bg-gray-200 dark:bg-gray-700 text-black dark:text-white px-4 py-2 rounded-md">
      🌙 Toggle Theme
    </button>
  </div>

  <div class="w-full max-w-4xl bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 space-y-6">
    <h1 class="text-3xl font-bold text-center text-blue-600 dark:text-blue-400">
      🎨 Generative UI Designer
    </h1>

    <!-- Style Preference Dropdown -->
    <div>
      <label for="styleSelect" class="block font-semibold mb-1 text-gray-700 dark:text-gray-200">Preferred Style Framework:</label>
      <select
        id="styleSelect"
        class="w-full border rounded-lg p-2 text-gray-700 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option value="tailwind">Tailwind CSS</option>
        <option value="daisyui">DaisyUI</option>
        <option value="flowbite">Flowbite</option>
        <option value="vanilla">Plain HTML/CSS</option>
        <option value="auto">Auto Detect (Raw Prompt)</option>
      </select>
    </div>

    <!-- Prompt input -->
    <textarea
      id="promptInput"
      rows="4"
      placeholder="Describe your UI... e.g. 'Create a login page with input fields and a button'"
      class="w-full border rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 dark:text-white dark:bg-gray-700 text-lg"
    ></textarea>

    <!-- Action Buttons -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <button
        id="generateBtn"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition"
      >
        Generate UI ✨
      </button>
      <button
        id="micBtn"
        class="bg-gray-700 hover:bg-gray-800 text-white font-semibold py-3 rounded-lg transition"
      >
        🎤 Speak
      </button>
      <button
        id="downloadBtn"
        class="bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition"
      >
        ⬇️ Download HTML
      </button>
    </div>

    <!-- Image-Based Generation Section -->
    <div class="border-t pt-6 mt-6 space-y-4">
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white">🖼️ Generate from Image</h3>

      <input
        type="text"
        id="imageUrl"
        placeholder="Enter image URL..."
        class="w-full border rounded-lg p-2 text-gray-700 dark:text-white dark:bg-gray-700"
      />

      <div class="flex items-center gap-4">
        <input
          type="file"
          id="imageUpload"
          accept="image/*"
          class="border rounded-lg p-2 text-sm dark:bg-gray-700 dark:text-white"
        />
        <button
          id="generateFromImageBtn"
          class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-4 rounded-lg transition"
        >
          Generate from Image
        </button>
      </div>
    </div>

    <!-- Code output with copy & download -->
    <div class="relative">
      <button
        id="copyBtn"
        class="absolute top-2 right-2 bg-gray-800 text-white text-sm px-3 py-1 rounded hover:bg-gray-700"
      >
        Copy Code
      </button>
      <pre class="mt-6 p-4 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white text-sm overflow-auto">
        <code id="outputArea" class="language-html font-mono whitespace-pre-wrap"></code>
      </pre>
    </div>

    <!-- Live Preview with Device Toggle and Frame -->
    <div class="mt-10">
      <h2 class="text-xl font-semibold mb-2 text-gray-700 dark:text-white">🔍 Live Preview</h2>

      <!-- Device Toggle Buttons -->
      <div class="flex justify-center space-x-4 mb-4">
        <button class="device-btn bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600" data-size="desktop">💻 Desktop</button>
        <button class="device-btn bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600" data-size="tablet">📱 Tablet</button>
        <button class="device-btn bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600" data-size="mobile">📱 Mobile</button>
      </div>

      <!-- Device Frame Container -->
      <div class="flex justify-center">
        <div id="deviceFrame" class="device-frame-desktop transition-all duration-300 ease-in-out overflow-hidden shadow-xl border bg-black rounded-lg">
          <div id="previewArea" class="bg-white dark:bg-gray-100 w-full h-full p-4 overflow-auto rounded-md"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 📱 Frame Styles -->
  <style>
    #deviceFrame {
      background: #222;
      padding: 16px;
    }

    .device-frame-desktop {
      width: 100%;
      max-width: 1024px;
      height: 600px;
      border-radius: 12px;
    }

    .device-frame-tablet {
      width: 768px;
      height: 550px;
      border-radius: 20px;
    }

    .device-frame-mobile {
      width: 375px;
      height: 667px;
      border-radius: 40px;
    }
  </style>

  <script src="app.js"></script>

  <!-- 🌙 Dark Mode Script -->
  <script>
    const pageBody = document.getElementById("pageBody");
    const themeToggle = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "dark") {
      pageBody.classList.add("dark");
    }

    themeToggle.addEventListener("click", () => {
      pageBody.classList.toggle("dark");
      localStorage.setItem("theme", pageBody.classList.contains("dark") ? "dark" : "light");
    });
  </script>

</body>
</html>
